# Dynasty FF Lil' Helper — 2026 "astroturf" theme
# Green-tinted near-black base, field-green + gold accents, grotesk type.
# The old coral action color is retired (see redesign instructions P1 #1–2).
# Token values mirror the CSS :root block + Python TOKENS dict in
# sleeper_dashboard.py — keep all three in sync.
# NOTE: dark-only by design for this redesign (no light theme).

[theme]
base = "dark"
primaryColor = "#2FA866"              # field green — buttons, selected widgets, focus
backgroundColor = "#0A0F0C"           # app background
secondaryBackgroundColor = "#111814"  # cards / inputs / surfaces
textColor = "#F2F5F3"
linkColor = "#34D17E"                 # green-bright
baseRadius = "0.7rem"
borderColor = "#232E27"
showWidgetBorder = true
font = "Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
headingFont = "Space Grotesk, Inter, sans-serif"

[theme.sidebar]
backgroundColor = "#0A0F0C"
secondaryBackgroundColor = "#161E19"
borderColor = "#232E27"

[client]
toolbarMode = "minimal"               # belt-and-suspenders chrome reduction

[browser]
gatherUsageStats = false
